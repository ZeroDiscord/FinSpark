services:
  frontend:
    build:
      context: ./Frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: http://localhost:3001/api
    ports:
      - "5173:80"
    depends_on:
      - backend

  backend:
    build:
      context: ./Backend
      dockerfile: Dockerfile
    env_file:
      - ./Backend/.env.example
    environment:
      PORT: 3001
      FRONTEND_URL: http://localhost:5173
      ML_BASE_URL: http://ml-service:8000
      MONGO_URI: mongodb://mongodb:27017
      MONGO_DB_NAME: finspark
      KAFKA_BROKERS: kafka:9092
    volumes:
      - ./uploads:/app/uploads
      - ./datasets:/app/datasets
    ports:
      - "3001:3001"
    depends_on:
      - mongodb
      - ml-service
      - kafka

  kafka-consumer:
    build:
      context: ./kafka-consumer
      dockerfile: Dockerfile
    environment:
      KAFKA_BROKERS: kafka:9092
      MONGO_URI: mongodb://mongodb:27017
      MONGO_DB_NAME: finspark
      CSV_PATH: /app/datasets/events.csv
    volumes:
      - ./datasets:/app/datasets
    depends_on:
      kafka:
        condition: service_healthy
      mongodb:
        condition: service_started

  ml-service:
    build:
      context: ./ML
      dockerfile: Dockerfile
    env_file:
      - ./ML/.env.example
    environment:
      API_KEY: dev-secret-key
    ports:
      - "8000:8000"

  mongodb:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongodata:/data/db

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 10s
      timeout: 10s
      retries: 10

  kafka-init:
    image: confluentinc/cp-kafka:7.6.0
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c"]
    command: |
      "
      kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic feature-events --partitions 6 --replication-factor 1
      kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic training-events --partitions 2 --replication-factor 1
      kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic recommendation-events --partitions 2 --replication-factor 1
      kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic feature-events-dlq --partitions 2 --replication-factor 1
      echo 'Topics created.'
      "

volumes:
  mongodata:
